# Spot deployment playbook for Polyrust
# Usage:
#   spot -t prod                                    # full deploy (build + push + restart)
#   spot -t prod -n update-config                   # config only (no rebuild)
#   spot -t prod -n restart                         # restart container only
#   spot -t prod --dry                              # dry run
#
# Prerequisites:
#   docker login ghcr.io -u <github-user> -p <PAT>  # local (push)
#   docker login ghcr.io -u <github-user> -p <PAT>  # server (pull)

user: root
ssh_key: ~/.ssh/id_rsa

targets:
  prod:
    hosts:
      - { host: "79.132.137.31" }

tasks:
  - name: deploy
    commands:
      - name: build and push docker image
        script: docker buildx build --platform linux/amd64 -t ghcr.io/nniel-ape/polyrust:latest --push .
        options: { local: true }

      - name: decrypt secrets
        script: |
          sops -d --output-type dotenv secrets/prod.yaml \
            | awk '{idx=index($0,"="); if(idx>0) print toupper(substr($0,1,idx-1)) "=" substr($0,idx+1)}' \
            > .env.deploy
        options: { local: true }

      - name: create remote directories
        script: mkdir -p /root/polyrust/data /root/polyrust/logs && chown 1000:1000 /root/polyrust/data /root/polyrust/logs

      - name: copy config files
        copy:
          - { src: "docker-compose.yml", dst: "/root/polyrust/docker-compose.yml", mkdir: true }
          - { src: "config.toml", dst: "/root/polyrust/config.toml" }
          - { src: ".env.deploy", dst: "/root/polyrust/.env" }

      - name: pull and start services
        script: cd /root/polyrust && docker compose pull && docker compose down && docker compose up -d

      - name: verify deployment
        script: cd /root/polyrust && docker compose ps

      - name: cleanup local artifacts
        script: rm -f .env.deploy
        options: { local: true }

  - name: update-config
    commands:
      - name: decrypt secrets
        script: |
          sops -d --output-type dotenv secrets/prod.yaml \
            | awk '{idx=index($0,"="); if(idx>0) print toupper(substr($0,1,idx-1)) "=" substr($0,idx+1)}' \
            > .env.deploy
        options: { local: true }

      - name: copy config files
        copy:
          - { src: "docker-compose.yml", dst: "/root/polyrust/docker-compose.yml", mkdir: true }
          - { src: "config.toml", dst: "/root/polyrust/config.toml" }
          - { src: ".env.deploy", dst: "/root/polyrust/.env" }

      - name: restart services
        script: cd /root/polyrust && docker compose down && docker compose up -d

      - name: cleanup local artifacts
        script: rm -f .env.deploy
        options: { local: true }

  - name: restart
    commands:
      - name: restart container
        script: cd /root/polyrust && docker compose restart
