services:
  polyrust:
    image: ${IMAGE_NAME:-ghcr.io/nniel-ape/polyrust:latest}
    container_name: polyrust
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - POLY_DASHBOARD_HOST=0.0.0.0
      - POLY_DB_PATH=/app/data/polyrust.db
      - RUST_LOG=${RUST_LOG:-info,polyrust=info}
    volumes:
      - ./data:/app/data
      - ./config.toml:/app/config.toml:ro
      - ./logs:/app/logs
    command: ["sh", "-c", "cp /app/logs/polyrust.log /app/logs/polyrust.log.prev 2>/dev/null; : > /app/logs/polyrust.log; ./polyrust 2>&1 | tee -a /app/logs/polyrust.log"]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
