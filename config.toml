# Polyrust Trading Bot — Configuration Reference
#
# Copy to config.toml and customize. All sections are optional with sensible defaults.
# Override any value with POLY_* environment variables:
#   POLY_PRIVATE_KEY, POLY_SAFE_ADDRESS,
#   POLY_BUILDER_API_KEY, POLY_BUILDER_API_SECRET, POLY_BUILDER_API_PASSPHRASE,
#   POLY_DASHBOARD_PORT, POLY_DB_PATH, POLY_PAPER_TRADING, POLY_RPC_URLS

# ─────────────────────────────────────────────────────────────────────────────
# ENGINE
# ─────────────────────────────────────────────────────────────────────────────

[engine]
event_bus_capacity = 4096        # Tokio broadcast channel capacity
health_check_interval_secs = 30  # Health check frequency

# ─────────────────────────────────────────────────────────────────────────────
# POLYMARKET CREDENTIALS — env-only, see .env / .env.example
# All polymarket config is loaded from POLY_* environment variables.
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# DASHBOARD
# ─────────────────────────────────────────────────────────────────────────────

[dashboard]
enabled = true
port = 3000
host = "0.0.0.0"  # Use "0.0.0.0" for remote access

# ─────────────────────────────────────────────────────────────────────────────
# PERSISTENCE
# ─────────────────────────────────────────────────────────────────────────────

[store]
db_path = "polyrust.db"  # Use ":memory:" for testing

# ─────────────────────────────────────────────────────────────────────────────
# PAPER TRADING
# ─────────────────────────────────────────────────────────────────────────────

[paper]
enabled = false           # Set false + credentials for live trading
initial_balance = 10000  # Starting USDC balance

# ─────────────────────────────────────────────────────────────────────────────
# AUTO-CLAIM
# ─────────────────────────────────────────────────────────────────────────────
# Automatically redeem winning positions after market resolution on-chain

[auto_claim]
enabled = true                # Enable automatic position redemption
poll_interval_secs = 300      # Check for resolved markets every 5 minutes
max_retries = 10              # Max attempts before manual intervention needed
retry_backoff_secs = 60       # Wait 1 minute between retry attempts
batch_window_secs = 300       # Max wait after first resolved claim before flushing batch (0 = immediate)
batch_min_count = 2           # Flush early when this many claims are ready (before window elapses)


# ═══════════════════════════════════════════════════════════════════════════════
# CRYPTO ARBITRAGE STRATEGY
# ═══════════════════════════════════════════════════════════════════════════════

[arbitrage]
enabled = true                  # Enable the crypto arbitrage strategy
coins = ["BTC", "ETH"]         # Coins to trade 15-min Up/Down markets on
max_positions = 5               # Max concurrent open positions across all markets
use_chainlink = true            # Use Chainlink oracle as additional price source
min_profit_margin = 0.03        # Min net profit margin after fees to consider a trade (3%)

[arbitrage.sizing]
base_size = 5                   # Base USDC position size per trade
# kelly_multiplier = 0.25      # Fractional Kelly: fraction of Kelly-optimal size
# min_size = 2                 # Floor on position size (USDC)
# max_size = 25                # Cap on position size (USDC)
# use_kelly = true             # false = fixed base_size; true = Kelly criterion sizing

# ─────────────────────────────────────────────────────────────────────────────
# TAILEND STRATEGY — high-confidence trades near market expiration
# Calibrated via 9 sweeps / 1,336 combos (2026-02-14/15)
# See analysis/output/sweep_calibration_report.md for full calibration details
# ─────────────────────────────────────────────────────────────────────────────

[arbitrage.tailend]
# Entry gate: min ask price by time remaining [secs, threshold]
# Only the 60s bucket showed sensitivity; 120/90/30 are dead in backtest
dynamic_thresholds = [[120, "0.90"], [90, "0.92"], [60, "0.95"], [30, "0.95"]]
# Max bid-ask spread in basis points to enter (200 bps = 2 cents)
max_spread_bps = "200"
# Max recent price volatility to enter; filters noisy markets (0.10 = 10%)
max_recent_volatility = "0.10"
# Min distance between strike and current price; filters near-ATM entries
min_strike_distance_pct = "0.001"
# Min seconds price must sustain above threshold (0 = no wait; dead param)
min_sustained_secs = 0
# Bid drop from entry that triggers early exit within post_entry_window
post_entry_exit_drop = "0.03"
# Seconds after entry during which post_entry_exit_drop is active
post_entry_window_secs = 60
# Min seconds after entry before selling is allowed (anti-churn)
min_sell_delay_secs = 8
# Cooldown after FOK rejection before retrying (secs)
fok_cooldown_secs = 15
# Max orderbook age before considering it stale (secs)
stale_ob_secs = 30
# Use composite price from multiple sources for stop-loss decisions
use_composite_price = true
# Max age of any single source in composite price (secs)
max_source_stale_secs = 5

# ─────────────────────────────────────────────────────────────────────────────
# STOP-LOSS — 4-level trigger hierarchy
# Priority: HardCrash > DualTrigger > TrailingStop > PostEntryExit
# In backtest, only hard_drop_abs showed sensitivity (cliff at 0.02-0.03).
# All other params are dead in 15-min tail-end regime (positions converge
# to 1.0 monotonically). They exist for live trading protection.
# ─────────────────────────────────────────────────────────────────────────────

[arbitrage.stop_loss]
# Level 1 — HardCrash (EITHER leg triggers independently)
hard_drop_abs = 0.03            # Bid drop from entry to trigger (e.g., 0.95→0.92)
hard_reversal_pct = 0.006       # External crypto reversal % (0.6%)
# Level 2 — DualTrigger (BOTH must hold for N consecutive ticks)
reversal_pct = 0.003            # Crypto reversal % for dual trigger (0.3%)
min_drop = 0.05                 # Min bid drop from entry for dual trigger (5 cents)
dual_trigger_consecutive_ticks = 2  # Ticks both conditions must persist
# Level 3 — TrailingStop
trailing_enabled = true         # Enable trailing stop-loss
trailing_distance = 0.05        # Distance from peak bid to trigger
trailing_arm_distance = 0.015   # Price must rise this much above entry to arm
trailing_min_distance = 0.015   # Floor after time decay (prevents noise triggers)
time_decay = true               # Tighten trailing distance as expiry approaches

# ═══════════════════════════════════════════════════════════════════════════════
# BACKTESTING
# ═══════════════════════════════════════════════════════════════════════════════

[backtest]
strategy_name = "crypto-arb-tailend"    # Match TailEndStrategy::name()
market_ids = []                          # Auto-discover markets via Gamma API
start_date = "2025-12-01T00:00:00Z"
end_date = "2026-01-31T00:00:00Z"       # Today
initial_balance = "1000.00"             # Starting capital (1,000 USDC)
data_fidelity_secs = 5                  # Sub-minute: synthesize PriceChange from trades
market_duration_secs = 900              # 15 minutes ONLY (NEW: duration filter)
data_db_path = "backtest_data.db"       # Persistent cache
offline = true # Skip network fetches, use cached data only

[backtest.sizing]
base_size = "10"              # Larger base for backtest exploration
depth_cap_factor = "0.70"    # More aggressive depth cap for backtest

[backtest.fees]
taker_fee_rate = "0.0315"  # Polymarket taker fee at 50/50 probability

# ─────────────────────────────────────────────────────────────────────────────
# PARAMETER SWEEP (cargo run -- --backtest-sweep)
# ─────────────────────────────────────────────────────────────────────────────
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ PARAMETER REFERENCE — defaults / min / max for sweep calibration           │
# ├───────────────────────────────────────┬─────────┬─────────┬────────────────┤
# │ Parameter                             │ Default │ Min     │ Max            │
# ├───────────────────────────────────────┼─────────┼─────────┼────────────────┤
# │ ENTRY FILTERS                         │         │         │                │
# │ tailend.max_spread_bps                │ 200     │ 50      │ 500            │
# │ tailend.min_sustained_secs            │ 5       │ 0       │ 15             │
# │ tailend.max_recent_volatility         │ 0.02    │ 0.005   │ 0.10           │
# │ tailend.min_strike_distance_pct       │ 0.005   │ 0.001   │ 0.010          │
# │                                       │         │         │                │
# │ DYNAMIC THRESHOLDS (ask min by time)  │         │         │                │
# │ dynamic_thresholds.120                │ 0.90    │ 0.86    │ 0.94           │
# │ dynamic_thresholds.90                 │ 0.92    │ 0.88    │ 0.95           │
# │ dynamic_thresholds.60                 │ 0.93    │ 0.90    │ 0.96           │
# │ dynamic_thresholds.30                 │ 0.95    │ 0.92    │ 0.97           │
# │                                       │         │         │                │
# │ STOP-LOSS TRIGGERS                    │         │         │                │
# │ stop_loss.hard_drop_abs               │ 0.08    │ 0.04    │ 0.15           │
# │ stop_loss.hard_reversal_pct           │ 0.006   │ 0.003   │ 0.012          │
# │ stop_loss.reversal_pct                │ 0.003   │ 0.001   │ 0.008          │
# │ stop_loss.min_drop                    │ 0.05    │ 0.02    │ 0.10           │
# │ stop_loss.dual_trigger_consecutive    │ 2       │ 1       │ 4              │
# │                                       │         │         │                │
# │ TRAILING STOP & LIFECYCLE             │         │         │                │
# │ stop_loss.trailing_distance           │ 0.05    │ 0.02    │ 0.08           │
# │ stop_loss.trailing_arm_distance       │ 0.015   │ 0.008   │ 0.030          │
# │ stop_loss.trailing_min_distance       │ 0.015   │ 0.008   │ 0.025          │
# │ tailend.post_entry_exit_drop          │ 0.05    │ 0.02    │ 0.10           │
# │ tailend.post_entry_window_secs        │ 20      │ 12      │ 35             │
# │ tailend.min_sell_delay_secs           │ 10      │ 5       │ 12             │
# │                                       │         │         │                │
# │ RECOVERY                              │         │         │                │
# │ stop_loss.recovery_max_set_cost       │ 1.01    │ 0.99    │ 1.04           │
# │ stop_loss.reentry_cooldown_secs       │ 8       │ 4       │ 20             │
# │                                       │         │         │                │
# │ EXCLUDED (backtest runner overrides):                                      │
# │ stop_loss.min_remaining_secs → forced to 0                                │
# │ tailend.stale_ob_secs → forced to MAX                                     │
# │ tailend.rejection_cooldown_secs → no effect (immediate fills)             │
# │ sizing.* → TailEnd uses fixed base_size/price, not Kelly                  │
# └────────────────────────────────────────────────────────────────────────────┘

[backtest.sweep]
parallelism = 8
output_dir = "sweep_results"
rank_by = "sharpe"
top_n = 20
force = true

