# Polyrust Trading Bot — Configuration Reference
#
# Copy to config.toml and customize. All sections are optional with sensible defaults.
# Override any value with POLY_* environment variables:
#   POLY_PRIVATE_KEY, POLY_SAFE_ADDRESS,
#   POLY_BUILDER_API_KEY, POLY_BUILDER_API_SECRET, POLY_BUILDER_API_PASSPHRASE,
#   POLY_DASHBOARD_PORT, POLY_DB_PATH, POLY_PAPER_TRADING, POLY_RPC_URLS,
#   POLY_USE_RELAYER, POLY_RELAYER_URL

# ─────────────────────────────────────────────────────────────────────────────
# ENGINE
# ─────────────────────────────────────────────────────────────────────────────

[engine]
event_bus_capacity = 4096        # Tokio broadcast channel capacity
health_check_interval_secs = 30  # Health check frequency
reconcile_interval_secs = 15     # Order reconciliation interval (0 = disabled)

# ─────────────────────────────────────────────────────────────────────────────
# POLYMARKET CREDENTIALS — env-only (see .env.example)
# ─────────────────────────────────────────────────────────────────────────────
# All polymarket config is loaded from POLY_* environment variables.
# Copy .env.example → .env and fill in your values. Available vars:
#
#   POLY_PRIVATE_KEY          — wallet private key (required for live trading)
#   POLY_SAFE_ADDRESS         — Safe multisig address (required for live trading)
#   POLY_BUILDER_API_KEY      — builder API key (required for live trading)
#   POLY_BUILDER_API_SECRET   — builder API secret (required for live trading)
#   POLY_BUILDER_API_PASSPHRASE — builder API passphrase (required for live trading)
#   POLY_RPC_URLS             — comma-separated Polygon RPC endpoints (default: https://polygon-rpc.com)
#   POLY_USE_RELAYER          — gasless relayer (default: true when builder creds present)
#   POLY_RELAYER_URL          — custom relayer endpoint (default: https://relayer-v2.polymarket.com)

# ─────────────────────────────────────────────────────────────────────────────
# DASHBOARD
# ─────────────────────────────────────────────────────────────────────────────

[dashboard]
enabled = true
port = 3000
host = "127.0.0.1"  # Use "0.0.0.0" for Docker/remote access, "127.0.0.1" for local only

# ─────────────────────────────────────────────────────────────────────────────
# PERSISTENCE
# ─────────────────────────────────────────────────────────────────────────────

[store]
db_path = "polyrust.db"  # Use ":memory:" for testing

# ─────────────────────────────────────────────────────────────────────────────
# PAPER TRADING
# ─────────────────────────────────────────────────────────────────────────────

[paper]
enabled = true           # Set false + credentials for live trading
initial_balance = 10000  # Starting USDC balance

# ─────────────────────────────────────────────────────────────────────────────
# AUTO-CLAIM
# ─────────────────────────────────────────────────────────────────────────────
# Automatically redeem winning positions after market resolution on-chain

[auto_claim]
enabled = true                # Enable automatic position redemption
poll_interval_secs = 300      # Check for resolved markets every 5 minutes
max_retries = 10              # Max attempts before manual intervention needed
retry_backoff_secs = 60       # Wait 1 minute between retry attempts
batch_window_secs = 300       # Max wait after first resolved claim before flushing batch (0 = immediate)
batch_min_count = 3           # Flush early when this many claims are ready (before window elapses)
settlement_delay_secs = 30    # Wait after resolution detected before redeeming (avoids racing settlement tx)

# ═══════════════════════════════════════════════════════════════════════════════
# CRYPTO ARBITRAGE STRATEGY
# ═══════════════════════════════════════════════════════════════════════════════
# Exploits mispricing in 15-minute Up/Down crypto markets.
# High-confidence trades near expiration (<2 min remaining, market >= 90%).
#
# IMPORTANT: Strategy is DISABLED by default. Set `enabled = true` to activate.

# [arbitrage]
# enabled = true                       # Enable the strategy
# coins = ["BTC", "ETH", "SOL", "XRP"]  # Coins to track
# max_positions = 5                      # Maximum concurrent positions
# min_profit_margin = 0.03               # 3% net profit margin (env: POLY_MIN_PROFIT_MARGIN, CLI: --min-profit)
# late_window_margin = 0.02              # 2% relaxed margin (120-300s remaining)
# scan_interval_secs = 30                # Market discovery scan interval
# use_chainlink = true                   # On-chain Chainlink vs RTDS boundary snapshots

# ─────────────────────────────────────────────────────────────────────────────
# TailEnd Mode
# ─────────────────────────────────────────────────────────────────────────────
# High-confidence trades near market expiration

# [arbitrage.tailend]
# time_threshold_secs = 120      # Max time remaining to enter (default 120s)
# ask_threshold = 0.90           # Minimum ask price to enter (default 0.90)
# min_sustained_ticks = 2        # Minimum price ticks confirming direction (default 2)
# min_strike_distance_pct = 0.0012  # Min crypto distance from strike (0.12% ≈ $2.40 at ETH $2000)
# use_composite_price = false     # Use weighted composite price from multiple sources (default false)
# max_source_stale_secs = 10      # Max age per source in seconds (default 10)
# min_sources = 2                 # Minimum fresh sources required (default 2)
# max_dispersion_bps = 50         # Max allowed source disagreement in bps (default 50)

# ─────────────────────────────────────────────────────────────────────────────
# Fee Model
# ─────────────────────────────────────────────────────────────────────────────
# Polymarket's dynamic taker fee: ~3.15% at 50/50, ~0% near 0/1

# [arbitrage.fee]
# taker_fee_rate = 0.0315  # 3.15% at 50/50 probability

# ─────────────────────────────────────────────────────────────────────────────
# Spike Detection
# ─────────────────────────────────────────────────────────────────────────────
# Pre-filter small price moves; trigger evaluation only on significant changes

# [arbitrage.spike]
# threshold_pct = 0.005   # 0.5% minimum price change to count as spike
# window_secs = 10        # Lookback window for spike detection
# history_size = 50       # Maximum spike events to retain

# ─────────────────────────────────────────────────────────────────────────────
# Order Settings
# ─────────────────────────────────────────────────────────────────────────────
# GTC maker orders (0% fee) for most trades, FOK taker only for tail-end urgency

# [arbitrage.order]
# max_age_secs = 30       # Cancel stale GTC orders after this duration

# ─────────────────────────────────────────────────────────────────────────────
# Position Sizing (Kelly Criterion)
# ─────────────────────────────────────────────────────────────────────────────
# Scale position size with confidence and edge; clamp to [min_size, max_size]

# [arbitrage.sizing]
# base_size = 10          # Base USDC position size
# kelly_multiplier = 0.25 # 25% fractional Kelly (conservative)
# min_size = 2            # Minimum position size
# max_size = 25           # Maximum position size
# use_kelly = true        # false = fixed base_size for all trades

# ─────────────────────────────────────────────────────────────────────────────
# Stop-Loss (Dual-Trigger + Trailing + Lifecycle)
# ─────────────────────────────────────────────────────────────────────────────
# Dual-trigger: crypto reversal AND market drop required to exit
# Lifecycle state machine: Healthy → DeferredExit → ExitExecuting → ResidualRisk → RecoveryProbe → Cooldown

# [arbitrage.stop_loss]
# reversal_pct = 0.005        # 0.5% crypto price reversal threshold
# min_drop = 0.05             # $0.05 minimum market price drop
# trailing_enabled = true     # Enable trailing stop-loss
# trailing_distance = 0.03    # $0.03 from peak bid
# trailing_min_distance = 0.05 # Floor on effective trailing distance (prevents noise triggers)
# time_decay = true           # Tighten stops near expiration
# liquidity_cooldowns = [1, 5, 15, 30]   # Cooldowns for "couldn't be fully filled" (seconds)
# balance_cooldowns = [5, 15, 30, 60]    # Cooldowns for balance/allowance errors (seconds)
# gtc_fallback = true         # Fall back to GTC after FOK liquidity rejection
# gtc_fallback_tick_offset = 1 # Ticks below bid for GTC stop-loss (e.g. bid=0.91 → 0.90)
# gtc_stop_loss_max_age_secs = 10  # Cancel stale GTC stop-loss orders after this (seconds)
#
# Hard crash detection — bypasses hysteresis, requires 1 fresh source + fresh book
# hard_drop_abs = 0.08        # Absolute bid drop from entry to trigger (e.g. 0.95 → 0.87)
# hard_reversal_pct = 0.006   # External price reversal % for hard crash (0.6%)
# hard_window_ms = 2000       # Time window for hard crash detection (ms)
#
# Freshness gating — stale data suppresses all triggers except hard-crash
# sl_max_book_age_ms = 1200   # Max orderbook age for stop-loss decisions (ms)
# sl_max_external_age_ms = 1500 # Max external price age for stop-loss decisions (ms)
# sl_min_sources = 2          # Min fresh sources for composite stop-loss price
# sl_max_dispersion_bps = 50  # Max source disagreement for stop-loss composite (bps)
#
# Hysteresis — dual trigger must hold for N consecutive ticks
# dual_trigger_consecutive_ticks = 2
#
# Short-lived limit orders — 2s cancel/replace cadence for GTC exits
# short_limit_refresh_secs = 2  # Refresh GTC exit orders every N seconds
# short_limit_tick_offset = 1   # Ticks below bid for short-lived GTC exits
#
# Trailing arming — distance from entry to arm trailing stop
# trailing_arm_distance = 0.015  # Capped by headroom: min(this, price_cap - entry)
#
# Execution ladder — depth-capped clip sizing + retry budget
# exit_depth_cap_factor = 0.80  # Cap exit clip to N% of bid depth
# max_exit_retries = 5          # Max retries before escalating to recovery
#
# Recovery — opposite-side set completion + re-entry after failed exits
# recovery_enabled = true       # Enable recovery logic
# recovery_max_set_cost = 1.01  # Max combined cost for set completion (entry + other ask)
# recovery_max_extra_frac = 0.15 # Max extra risk fraction for alpha trades (15%)
# reentry_confirm_ticks = 2    # Consecutive confirming ticks before re-entry
# reentry_cooldown_secs = 8    # Cooldown after recovery before re-entry allowed

# ─────────────────────────────────────────────────────────────────────────────
# Performance Tracking & Auto-Disable
# ─────────────────────────────────────────────────────────────────────────────
# Track win rate / P&L; optionally auto-disable when underperforming

# [arbitrage.performance]
# min_trades = 20         # Minimum trades before auto-disable can trigger
# min_win_rate = 0.40     # 40% win rate threshold
# window_size = 50        # Rolling window for recent P&L tracking
# auto_disable = false    # Auto-disable modes with low win rate

# ─────────────────────────────────────────────────────────────────────────────
# Order Rounding Precision
# ─────────────────────────────────────────────────────────────────────────────
# Polymarket API has specific decimal precision requirements:
# - Maker amount (USDC total): max 2 decimals
# - Taker amount (shares): max 2 decimals (SDK LOT_SIZE_SCALE = 2)
#
# Only change these if the API requirements change.

# [arbitrage.rounding]
# size_decimals = 2       # Max 2 decimals (SDK LOT_SIZE_SCALE limit)
# price_decimals = 2      # Standard tick size for 15-min markets (0.01)

# ═══════════════════════════════════════════════════════════════════════════════
# BACKTESTING
# ═══════════════════════════════════════════════════════════════════════════════
# Historical data backtesting framework for strategy evaluation
#
# Backtesting evaluates strategies on historical market data without live/paper
# trading. The framework fetches/caches data from Polymarket APIs and Goldsky
# subgraphs, then replays events deterministically through your strategy.
#
# Two databases:
#   1. backtest_data.db (persistent) — historical prices/trades cache, reused
#   2. :memory: Store (ephemeral) — simulated trades/orders using existing schema
#
# Data sources (smart routing):
#   - CLOB API (/prices-history, /trades) — last ~7 days, high-fidelity
#   - Goldsky activity subgraph — unlimited history, lower-fidelity
#   - Gamma API (/markets) — market discovery and metadata
#
# Fill mode: Immediate only (historical orderbook depth not available from
# Polymarket APIs). Fills simulate at historical trade price with fee model.
#
# Run: cargo run -- --backtest
#
# Environment variable overrides:
#   POLY_BACKTEST_STRATEGY         — strategy name to backtest
#   POLY_BACKTEST_START            — start date (RFC3339 format)
#   POLY_BACKTEST_END              — end date (RFC3339 format)
#   POLY_BACKTEST_INITIAL_BALANCE  — starting USDC balance
#   POLY_BACKTEST_DATA_DB_PATH     — path to historical data cache DB
#   POLY_BACKTEST_FIDELITY_SECS    — price data granularity in seconds
#   POLY_BACKTEST_MARKET_IDS       — comma-separated market IDs to backtest
#   POLY_BACKTEST_FETCH_CONCURRENCY — number of markets to fetch in parallel

# [backtest]
# strategy_name = "crypto-arb-tailend"    # Strategy to backtest (must be registered)
# market_ids = []                         # Markets to include (empty = auto-discover via Gamma API)
# start_date = "2025-01-01T00:00:00Z"     # Backtest window start (RFC3339 format)
# end_date = "2025-01-31T23:59:59Z"       # Backtest window end (RFC3339 format)
# initial_balance = 1000.00               # Starting USDC balance for backtest
# data_fidelity_secs = 60                 # Price granularity in seconds (60 = 1min, 300 = 5min, 3600 = 1hr)
# data_db_path = "backtest_data.db"       # Persistent historical data cache (reused across runs)
# fetch_concurrency = 10                  # Markets fetched in parallel (default 10)

# Fee model (matches strategy config for realistic P&L)
# [backtest.fees]
# taker_fee_rate = 0.0315  # 3.15% at 50/50 probability (Polymarket dynamic fee model)

# Realism settings — model real-world frictions for more accurate simulation.
# All defaults are zero-friction (conservative) so existing backtests are unaffected.
# [backtest.realism]
# slippage_ticks = 1             # Ticks (0.01 each) of slippage per fill (BUY +, SELL -)
# typical_depth = 150            # Shares at best bid/ask (replaces default 1000)
# depth_decay_near_expiry = true # Linearly reduce depth as market approaches expiration
# gtc_taker_fee_heuristic = true # Charge taker fee on GTC orders that cross the spread
