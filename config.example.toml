# Polyrust Trading Bot — Configuration Reference
#
# Copy to config.toml and customize. All sections are optional with sensible defaults.
# Override any value with POLY_* environment variables:
#   POLY_PRIVATE_KEY, POLY_SAFE_ADDRESS,
#   POLY_BUILDER_API_KEY, POLY_BUILDER_API_SECRET, POLY_BUILDER_API_PASSPHRASE,
#   POLY_DASHBOARD_PORT, POLY_DB_PATH, POLY_PAPER_TRADING, POLY_RPC_URLS

# ─────────────────────────────────────────────────────────────────────────────
# ENGINE
# ─────────────────────────────────────────────────────────────────────────────

[engine]
event_bus_capacity = 4096        # Tokio broadcast channel capacity
health_check_interval_secs = 30  # Health check frequency

# ─────────────────────────────────────────────────────────────────────────────
# POLYMARKET CREDENTIALS
# ─────────────────────────────────────────────────────────────────────────────

[polymarket]
# Credentials — set via environment variables, never commit secrets
# private_key = ""              # POLY_PRIVATE_KEY (wallet private key)
# safe_address = ""             # POLY_SAFE_ADDRESS (Safe multisig address)
# builder_api_key = ""          # POLY_BUILDER_API_KEY
# builder_api_secret = ""       # POLY_BUILDER_API_SECRET
# builder_api_passphrase = ""   # POLY_BUILDER_API_PASSPHRASE

# Polygon RPC endpoints for on-chain Chainlink oracle queries (tried in order).
# Override via POLY_RPC_URLS environment variable (comma-separated).
rpc_urls = ["https://polygon-rpc.com"]

# ─────────────────────────────────────────────────────────────────────────────
# DASHBOARD
# ─────────────────────────────────────────────────────────────────────────────

[dashboard]
enabled = true
port = 3000
host = "127.0.0.1"  # Use "0.0.0.0" for Docker/remote access, "127.0.0.1" for local only

# ─────────────────────────────────────────────────────────────────────────────
# PERSISTENCE
# ─────────────────────────────────────────────────────────────────────────────

[store]
db_path = "polyrust.db"  # Use ":memory:" for testing

# ─────────────────────────────────────────────────────────────────────────────
# PAPER TRADING
# ─────────────────────────────────────────────────────────────────────────────

[paper]
enabled = true           # Set false + credentials for live trading
initial_balance = 10000  # Starting USDC balance

# ═══════════════════════════════════════════════════════════════════════════════
# CRYPTO ARBITRAGE STRATEGY
# ═══════════════════════════════════════════════════════════════════════════════
# Exploits mispricing in 15-minute Up/Down crypto markets with four modes:
#   1. Tail-End    — <2 min remaining, market >= 90% (highest confidence)
#   2. Two-Sided   — both outcomes < $1 combined (guaranteed profit)
#   3. Confirmed   — dynamic confidence model (standard directional)
#   4. Cross-Correlated — follower coin triggered by leader spike
#
# IMPORTANT: All trading modes are DISABLED by default. Enable each mode
# explicitly with `enabled = true` in its config section.

# [arbitrage]
# coins = ["BTC", "ETH", "SOL", "XRP"]  # Coins to track
# max_positions = 5                      # Maximum concurrent positions
# min_profit_margin = 0.03               # 3% net profit for Confirmed mode
# late_window_margin = 0.02              # 2% relaxed margin (120-300s remaining)
# scan_interval_secs = 30                # Market discovery scan interval
# use_chainlink = true                   # On-chain Chainlink vs RTDS boundary snapshots

# ─────────────────────────────────────────────────────────────────────────────
# TailEnd Mode
# ─────────────────────────────────────────────────────────────────────────────
# High-confidence trades near market expiration

# [arbitrage.tailend]
# enabled = true                 # Enable TailEnd mode
# time_threshold_secs = 120      # Max time remaining to enter (default 120s)
# ask_threshold = 0.90           # Minimum ask price to enter (default 0.90)

# ─────────────────────────────────────────────────────────────────────────────
# TwoSided Mode
# ─────────────────────────────────────────────────────────────────────────────
# Risk-free arbitrage when both outcomes are mispriced

# [arbitrage.twosided]
# enabled = true                 # Enable TwoSided mode
# combined_threshold = 0.98      # Max combined ask price (default 0.98)

# ─────────────────────────────────────────────────────────────────────────────
# Confirmed Mode
# ─────────────────────────────────────────────────────────────────────────────
# Directional trades with dynamic confidence model

# [arbitrage.confirmed]
# enabled = true                 # Enable Confirmed mode
# min_confidence = 0.50          # Minimum confidence to enter (default 0.50)
# min_margin = 0.02              # Minimum net profit margin (default 2%)

# ─────────────────────────────────────────────────────────────────────────────
# Fee Model
# ─────────────────────────────────────────────────────────────────────────────
# Polymarket's dynamic taker fee: ~3.15% at 50/50, ~0% near 0/1

# [arbitrage.fee]
# taker_fee_rate = 0.0315  # 3.15% at 50/50 probability

# ─────────────────────────────────────────────────────────────────────────────
# Spike Detection
# ─────────────────────────────────────────────────────────────────────────────
# Pre-filter small price moves; trigger evaluation only on significant changes

# [arbitrage.spike]
# threshold_pct = 0.005   # 0.5% minimum price change to count as spike
# window_secs = 10        # Lookback window for spike detection
# history_size = 50       # Maximum spike events to retain

# ─────────────────────────────────────────────────────────────────────────────
# Hybrid Order Mode
# ─────────────────────────────────────────────────────────────────────────────
# GTC maker orders (0% fee) for most trades, FOK taker only for tail-end urgency

# [arbitrage.order]
# hybrid_mode = true      # Enable GTC maker + FOK taker strategy
# limit_offset = 0.01     # 1¢ below best ask for GTC limit orders
# max_age_secs = 30       # Cancel stale GTC orders after this duration

# ─────────────────────────────────────────────────────────────────────────────
# Position Sizing (Kelly Criterion)
# ─────────────────────────────────────────────────────────────────────────────
# Scale position size with confidence and edge; clamp to [min_size, max_size]

# [arbitrage.sizing]
# base_size = 10          # Base USDC position size
# kelly_multiplier = 0.25 # 25% fractional Kelly (conservative)
# min_size = 2            # Minimum position size
# max_size = 25           # Maximum position size
# use_kelly = true        # false = fixed base_size for all trades

# ─────────────────────────────────────────────────────────────────────────────
# Stop-Loss (Dual-Trigger + Trailing)
# ─────────────────────────────────────────────────────────────────────────────
# Dual-trigger: crypto reversal AND market drop required to exit

# [arbitrage.stop_loss]
# reversal_pct = 0.005        # 0.5% crypto price reversal threshold
# min_drop = 0.05             # $0.05 minimum market price drop
# trailing_enabled = true     # Enable trailing stop-loss
# trailing_distance = 0.03    # $0.03 from peak bid
# time_decay = true           # Tighten stops near expiration

# ─────────────────────────────────────────────────────────────────────────────
# Cross-Market Correlation (CrossCorr) Mode
# ─────────────────────────────────────────────────────────────────────────────
# Leader coin spikes (BTC) generate signals for follower coins (ETH, SOL)
# Confidence discounted by 0.7x for follower signals

# [arbitrage.correlation]
# enabled = false             # Enable CrossCorr mode (experimental, requires more capital)
# min_spike_pct = 0.01        # 1% leader spike threshold
# discount_factor = 0.7       # Confidence discount for follower signals
# pairs = [
#     ["BTC", ["ETH", "SOL"]],
#     ["ETH", ["SOL"]]
# ]

# ─────────────────────────────────────────────────────────────────────────────
# Performance Tracking & Auto-Disable
# ─────────────────────────────────────────────────────────────────────────────
# Track win rate / P&L per mode; optionally auto-disable underperformers

# [arbitrage.performance]
# min_trades = 20         # Minimum trades before auto-disable can trigger
# min_win_rate = 0.40     # 40% win rate threshold
# window_size = 50        # Rolling window for recent P&L tracking
# auto_disable = false    # Auto-disable modes with low win rate

# ─────────────────────────────────────────────────────────────────────────────
# Order Rounding Precision
# ─────────────────────────────────────────────────────────────────────────────
# Polymarket API has specific decimal precision requirements:
# - Maker amount (USDC total): max 2 decimals
# - Taker amount (shares): max 2 decimals (SDK LOT_SIZE_SCALE = 2)
#
# Only change these if the API requirements change.

# [arbitrage.rounding]
# size_decimals = 2       # Max 2 decimals (SDK LOT_SIZE_SCALE limit)
# price_decimals = 2      # Standard tick size for 15-min markets (0.01)

# ═══════════════════════════════════════════════════════════════════════════════
# BACKTESTING
# ═══════════════════════════════════════════════════════════════════════════════
# Historical data backtesting framework for strategy evaluation
#
# Backtesting evaluates strategies on historical market data without live/paper
# trading. The framework fetches/caches data from Polymarket APIs and Goldsky
# subgraphs, then replays events deterministically through your strategy.
#
# Two databases:
#   1. backtest_data.db (persistent) — historical prices/trades cache, reused
#   2. :memory: Store (ephemeral) — simulated trades/orders using existing schema
#
# Data sources (smart routing):
#   - CLOB API (/prices-history, /trades) — last ~7 days, high-fidelity
#   - Goldsky activity subgraph — unlimited history, lower-fidelity
#   - Gamma API (/markets) — market discovery and metadata
#
# Fill mode: Immediate only (historical orderbook depth not available from
# Polymarket APIs). Fills simulate at historical trade price with fee model.
#
# Run: cargo run -- --backtest
#
# Environment variable overrides:
#   POLY_BACKTEST_STRATEGY         — strategy name to backtest
#   POLY_BACKTEST_START            — start date (RFC3339 format)
#   POLY_BACKTEST_END              — end date (RFC3339 format)
#   POLY_BACKTEST_INITIAL_BALANCE  — starting USDC balance
#   POLY_BACKTEST_DATA_DB_PATH     — path to historical data cache DB
#   POLY_BACKTEST_FIDELITY_SECS    — price data granularity in seconds
#   POLY_BACKTEST_MARKET_IDS       — comma-separated market IDs to backtest
#   POLY_BACKTEST_FETCH_CONCURRENCY — number of markets to fetch in parallel

# [backtest]
# strategy_name = "crypto-arb"            # Strategy to backtest (must be registered)
# market_ids = []                         # Markets to include (empty = auto-discover via Gamma API)
# start_date = "2025-01-01T00:00:00Z"     # Backtest window start (RFC3339 format)
# end_date = "2025-01-31T23:59:59Z"       # Backtest window end (RFC3339 format)
# initial_balance = 1000.00               # Starting USDC balance for backtest
# data_fidelity_secs = 60                 # Price granularity in seconds (60 = 1min, 300 = 5min, 3600 = 1hr)
# data_db_path = "backtest_data.db"       # Persistent historical data cache (reused across runs)
# max_trades_per_market = 2000            # Cap trades fetched per market (default 2000, 0 = unlimited)
# fetch_concurrency = 10                  # Markets fetched in parallel (default 10)

# Fee model (matches strategy config for realistic P&L)
# [backtest.fees]
# taker_fee_rate = 0.0315  # 3.15% at 50/50 probability (Polymarket dynamic fee model)
