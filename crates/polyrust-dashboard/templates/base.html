<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Polyrust Dashboard</title>
  <script src="https://unpkg.com/htmx.org@2.0.0"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .pnl-positive { color: #16a34a; }
    .pnl-negative { color: #dc2626; }
  </style>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen">
  <nav class="bg-gray-900 border-b border-gray-800 px-6 py-3 flex items-center gap-6">
    <span class="text-lg font-bold text-white">Polyrust</span>
    <a href="/" class="hover:text-white">Overview</a>
    <a href="/positions" class="hover:text-white">Positions</a>
    <a href="/trades" class="hover:text-white">Trades</a>
    <a href="/health" class="hover:text-white">Health</a>
  </nav>
  <main class="max-w-6xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
