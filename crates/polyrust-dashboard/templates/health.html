{% extends "base.html" %}
{% block content %}
<h1 class="bp-page-title">System Health</h1>

<div class="grid grid-cols-2 md:grid-cols-4 gap-4">
  <div class="bp-card">
    <div class="bp-metric-label">EventBus Subscribers</div>
    <div class="bp-metric-value">{{ subscriber_count }}</div>
  </div>
  <div class="bp-card">
    <div class="bp-metric-label">Open Positions</div>
    <div class="bp-metric-value">{{ position_count }}</div>
  </div>
  <div class="bp-card">
    <div class="bp-metric-label">Open Orders</div>
    <div class="bp-metric-value">{{ order_count }}</div>
  </div>
  <div class="bp-card">
    <div class="bp-metric-label">Available USDC</div>
    <div class="bp-metric-value">{{ available_usdc }}</div>
  </div>
</div>
{% endblock %}
