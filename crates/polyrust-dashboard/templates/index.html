{% extends "base.html" %}
{% block content %}
<h1 class="bp-page-title">Overview</h1>

<div hx-ext="sse" sse-connect="/events/stream">
  <div id="pnl-summary" sse-swap="pnl-update" hx-swap="innerHTML">
    <div class="grid grid-cols-2 gap-4">
      <div class="bp-card">
        <div class="bp-metric-label">Unrealized PnL</div>
        <div class="bp-metric-value {{ pnl_class }}">{{ total_unrealized_pnl }} USDC</div>
      </div>
      <div class="bp-card">
        <div class="bp-metric-label">Available USDC</div>
        <div class="bp-metric-value">{{ available_usdc }}</div>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
    <div class="bp-card">
      <div class="bp-metric-label">Strategies</div>
      <div class="bp-metric-value">{{ strategy_count }}</div>
    </div>
    <div class="bp-card">
      <div class="bp-metric-label">Open Positions</div>
      <div class="bp-metric-value">{{ position_count }}</div>
    </div>
    <div class="bp-card">
      <div class="bp-metric-label">Open Orders</div>
      <div class="bp-metric-value">{{ order_count }}</div>
    </div>
    <div class="bp-card">
      <div class="bp-metric-label">Locked USDC</div>
      <div class="bp-metric-value">{{ locked_usdc }}</div>
    </div>
  </div>
</div>
{% endblock %}
