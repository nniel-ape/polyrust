# Polyrust Trading Bot — Default Configuration
#
# Override any value with POLY_* environment variables:
#   POLY_PRIVATE_KEY, POLY_SAFE_ADDRESS,
#   POLY_BUILDER_API_KEY, POLY_BUILDER_API_SECRET, POLY_BUILDER_API_PASSPHRASE,
#   POLY_DASHBOARD_PORT, POLY_DB_PATH, POLY_PAPER_TRADING

[engine]
event_bus_capacity = 4096
health_check_interval_secs = 30

[polymarket]
# Set credentials via environment variables — never commit secrets.
# private_key = ""
# safe_address = ""
# builder_api_key = ""
# builder_api_secret = ""
# builder_api_passphrase = ""

[dashboard]
enabled = true
port = 3000
host = "127.0.0.1"

[store]
db_path = "polyrust.db"

[paper]
enabled = true
initial_balance = 10000
